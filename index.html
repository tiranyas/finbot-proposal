  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

tml, body {\n    font-family: 'Assistant', sans-serif;\n    direction: rtl;\n    text-align: right;\n    background: var(--bg);\n    color: var(--ink);\n    line-height: 1.65;\n    font-size: 15px;\n    font-weight: 400;\n    font-variant-numeric: tabular-nums;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  /* Noise/grid texture on body */\n  body::before {\n    content: \"\";\n    position: fixed; inset: 0;\n    pointer-events: none;\n    background-image:\n      linear-gradient(var(--ink) 1px, transparent 1px),\n      linear-gradient(90deg, var(--ink) 1px, transparent 1px);\n    background-size: 48px 48px;\n    opacity: 0.025;\n    z-index: 0;\n  }\n\n  .mono { font-family: 'JetBrains Mono', monospace; letter-spacing: -0.01em; }\n  .grot { font-family: 'Space Grotesk', sans-serif; }\n\n  /* ============ TOOLBAR ============ */\n  .toolbar {\n    position: sticky; top: 0; z-index: 50;\n    background: var(--ink);\n    color: var(--dark-ink);\n    border-bottom: 1.5px solid var(--ink);\n    padding: 10px 24px;\n    display: flex; justify-content: space-between; align-items: center;\n    gap: 12px;\n  }\n  .toolbar .title {\n    font-family: 'JetBrains Mono', monospace;\n    font-weight: 500;\n    font-size: 12px;\n    letter-spacing: 0.04em;\n    text-transform: uppercase;\n    display: flex; align-items: center; gap: 10px;\n  }\n  .toolbar .title .blip {\n    display: inline-block;\n    width: 8px; height: 8px;\n    background: var(--brand-bright);\n    animation: blink 1.4s steps(2, end) infinite;\n  }\n  @keyframes blink {\n    50% { opacity: 0.2; }\n  }\n  .toolbar .actions { display: flex; gap: 0; }\n  .btn {\n    background: transparent; color: var(--dark-ink); border: 1px solid var(--dark-line);\n    padding: 8px 16px;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 11px;\n    font-weight: 500;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    cursor: pointer; transition: all 0.15s ease;\n    display: inline-flex; align-items: center; gap: 8px;\n  }\n  .btn + .btn { border-right: 0; }\n  .btn:hover:not(:disabled) { background: var(--brand); border-color: var(--brand); }\n  .btn:disabled { opacity: 0.3; cursor: not-allowed; }\n  .btn svg { width: 12px; height: 12px; stroke-width: 2; }\n\n  /* ============ PAGE ============ */\n  .page {\n    max-width: 900px; margin: 28px auto 60px;\n    background: var(--white);\n    border: 1.5px solid var(--ink);\n    border-radius: 20px;\n    position: relative;\n    z-index: 1;\n    box-shadow: 6px 6px 0 var(--ink);\n    overflow: hidden;\n  }\n\n  /* ============ HERO (dark, brutalist) ============ */\n  .hero {\n    background: var(--dark-bg);\n    color: var(--dark-ink);\n    padding: 36px 56px 32px;\n    position: relative;\n    overflow: hidden;\n    border-bottom: 1.5px solid var(--ink);\n  }\n  .hero::before {\n    content: \"\";\n    position: absolute;\n    inset: 0;\n    background:\n      radial-gradient(circle at 85% 50%, rgba(212, 72, 28, 0.28), transparent 55%),\n      radial-gradient(circle at 10% 100%, rgba(212, 72, 28, 0.12), transparent 60%);\n    pointer-events: none;\n    animation: glow 8s ease-in-out infinite alternate;\n  }\n  @keyframes glow {\n    0% { opacity: 0.7; }\n    100% { opacity: 1; }\n  }\n  .hero::after {\n    content: \"\";\n    position: absolute;\n    inset: 0;\n    background-image:\n      linear-gradient(rgba(245, 241, 235, 0.035) 1px, transparent 1px);\n    background-size: 100% 28px;\n    pointer-events: none;\n  }\n\n  .hero-top {\n    display: flex; justify-content: space-between; align-items: center;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: var(--ink-muted);\n    margin-bottom: 32px;\n    position: relative; z-index: 1;\n  }\n  .hero-top .status {\n    display: inline-flex; align-items: center; gap: 8px;\n    color: var(--brand-bright);\n  }\n  .hero-top .status::before {\n    content: \"\";\n    width: total-box { grid-template-columns: 1fr; gap: 16px; padding: 22px 24px; }\n    .total-box .grand { text-align: right; }\n    .total-box .grand .amount { font-size: 48px; }\n    .services > .service { border-left: 0 !important; border-bottom: 1px solid var(--ink) !important; }\n    .footer-note { padding: 14px 20px; }\n  }\n\n\n  /* === v4 CLEAN LUXURY - monochrome + single accent === */\n\n  :root {\n    --ink: #17171C;\n    --ink-2: #3F3F46;\n    --ink-soft: #71717A;\n    --ink-muted: #A1A1AA;\n    --line: #E4E4E7;\n    --line-soft: #F1F1F3;\n    --bg: #FAFAFA;\n    --white: #FFFFFF;\n    --accent: #C4451C;\n    --accent-soft: #FDF4EF;\n  }\n\n  body {\n    background: var(--bg) !important;\n    color: var(--ink) !important;\n    font-family: 'Assistant', sans-serif;\n  }\n\n  /* Clean page - no heavy shadows, no borders, generous padding */\n  .page {\n    background: var(--white) !important;\n    border: 1px solid var(--line) !important;\n    border-radius: 20px !important;\n    box-shadow: 0 1px 2px rgba(0,0,0,0.02), 0 8px 32px rgba(0,0,0,0.04) !important;\n    max-width: 900px !important;\n    margin: 40px auto 60px !important;\n    overflow: hidden !important;\n  }\n\n  /* Toolbar: minimal, no chrome */\n  .toolbar {\n    background: rgba(255, 255, 255, 0.85) !important;\n    backdrop-filter: blur(12px) !important;\n    -webkit-backdrop-filter: blur(12px) !important;\n    color: var(--ink) !important;\n    border-bottom: 1px solid var(--line) !important;\n    padding: 14px 24px !important;\n  }\n  .toolbar::after { display: none !important; }\n  .toolbar .title { color: var(--ink) !important; font-weight: 600; }\n  .toolbar .title .dot { color: var(--accent) !important; }\n  .toolbar .btn {\n    background: transparent !important;\n    color: var(--ink-2) !important;\n    border: 1px solid var(--line) !important;\n    border-radius: 8px !important;\n  }\n  .toolbar .btn:hover:not(:disabled) {\n    background: var(--white) !important;\n    border-color: var(--ink) !important;\n    color: var(--ink) !important;\n  }\n  .toolbar .blip, .toolbar .live-dot {\n    background: var(--accent) !important;\n    box-shadow: 0 0 8px rgba(196, 69, 28, 0.5) !important;\n  }\n\n  /* Hero: clean, NO chrome */\n  .hero {\n    background: var(--white) !important;\n    color: var(--ink) !important;\n    padding: 56px 56px 40px !important;\n    border-bottom: 1px solid var(--line) !important;\n  }\n  .hero::before, .hero::after { display: none !important; }\n  .hero-title { color: var(--ink) !important; font-weight: 600 !important; }\n  .hero-title .sub {\n    color: var(--accent) !important;\n    font-size: 11px !important;\n    letter-spacing: 0.2em !important;\n  }\n  .hero-meta, .hero-meta div { color: var(--ink-soft) !important; }\n  .hero-meta .label, .hero-meta .meta-label {\n    color: var(--ink-muted) !important;\n    font-size: 10px !important;\n    letter-spacing: 0.16em !important;\n    text-transform: uppercase;\n  }\n  .hero-meta .meta-value { color: var(--ink) !important; }\n  .hero-status { color: var(--ink-soft) !important; }\n  .grid-overlay { display: none !important; }\n\n  /* Content padding */\n  .content { padding: 48px 56px !important; }\n\n  /* Section headers */\n  h2 { color: var(--ink) !important; font-weight: 600 !important; }\n  h2 .num {\n    color: var(--accent) !important;\n    font-family: 'JetBrains Mono', monospace;\n    font-size: 10px !important;\n    letter-spacing: 0.2em !important;\n    font-weight: 500 !important;\n  }\n  .section-divider {\n    background: var(--accent) !important;\n    height: 1px !important;\n    width: 32px !important;\n  }\n\n  /* Parties - clean 2 cards, no chrome label */\n  .parties {\n    gap: 16px !important;\n    background: transparent !important;\n    border: 0 !important;\n    padding: 0 !important;\n  }\n  .party {\n    border: 1px solid var(--line) !important;\n    border-radius: 14px !important;\n    background: var(--white) !important;\n    padding: 24px 28px !important;\n    transition: border-color 0.2s ease, box-shadow 0.2s ease !important;\n  }\n  .party-label {\n    background: transparent !important;\n    color: var(--ink-muted) !important;\n    border: 0 !important;\n    padding: 0 !important;\n    font-size: 10px !important;\n    letter-spacing: 0.2em !important;\n    text-transform: uppercase;\n    font-weight: 600;\n    margin-bottom: 10px !important;\n  }\n  .party-name { color: var(--ink) !important; font-weight: 600 !important; }\n  .party-role { color: var(--ink-soft) !important; }\n\n  /* Services - clean cards, generous spacing */\n  .services {\n    gap: 16px !important;\n    border: 0 !important;\n    background: transparent !important;\n    padding: 0 !important;\n  }\n  .service {\n    background: var(--white) !important;\n    border: 1px solid var(--line) !important;\n    border-radius: 14px !important;\n    padding: 24px 26px !important;\n    transition: all 0.2s ease !important;\n  }\n  .service h3 { color: var(--ink) !important; }\n  .service p { color: var(--ink-soft) !important; }\n  .service-num { color: var(--accent) !important; }\n  .service:hover {\n    border-color: var(--ink) !important;\n    box-shadow: 0 4px 16px rgba(0,0,0,0.06) !important;\n    transform: translateY(-1px) !important;\n  }\n  .service:hover h3 { color: var(--ink) !important; text-shadow: none !important; }\n  .service:hover .service-num { color: var(--accent) !important; }\n  .service:hover p { color: var(--ink-soft) !important; }\n\n  /* Pricing intro - minimal */\n  .pricing-intro {\n    background: var(--accent-soft) !important;\n    border: 1px solid #F5E4D8 !important;\n    border-radius: 12px !important;\n    color: var(--ink) !important;\n  }\n  .pricing-intro .rate { color: var(--ink) !important; }\n  .pricing-intro .rate strong { color: var(--accent) !important; }\n  .pricing-intro .note { color: var(--ink-soft) !important; }\n\n  /* Packages - clean table */\n  .packages {\n    border: 1px solid var(--line) !importan with a big number. One accent line on top. */\n  .total-box {\n    background: var(--white) !important;\n    border: 1px solid var(--line) !important;\n    border-top: 3px solid var(--accent) !important;\n    border-radius: 0 0 14px 14px !important;\n    color: var(--ink) !important;\n    padding: 32px 36px !important;\n    margin-top: 16px !important;\n  }\n  .total-box::after { display: none !important; }\n  .total-box .label { color: var(--ink-muted) !important; font-size: 10px !important; letter-spacing: 0.2em !important; }\n  .total-box .package-name { color: var(--ink) !important; font-weight: 600 !important; }\n  .total-box .breakdown { color: var(--ink-soft) !important; }\n  .total-box .breakdown span { color: var(--ink) !important; font-weight: 600 !important; }\n  .total-box .grand .amount {\n    color: var(--ink) !important;\n    font-family: 'Varela Round', sans-serif !important;\n    font-size: 56px !important;\n    font-weight: 400 !important;\n    letter-spacing: -0.02em !important;\n    text-shadow: none !important;\n  }\n  .total-box .grand .currency { color: var(--ink-soft) !important; font-size: 20px !important; text-shadow: none !important; }\n  .total-box .grand .incl { color: var(--ink-muted) !important; }\n\n  /* Info cards */\n  .info-cards { gap: 16px !important; border: 0 !important; background: transparent !important; }\n  .info-card {\n    border: 1px solid var(--line) !important;\n    border-radius: 14px !important;\n    background: var(--white) !important;\n    padding: 24px 28px !important;\n    transition: border-color 0.2s ease, box-shadow 0.2s ease !important;\n  }\n  .info-card h3 {\n    color: var(--accent) !important;\n    border-bottom-color: var(--line) !important;\n  }\n  .info-card li { color: var(--ink-2) !important; }\n  .info-card li strong { color: var(--ink) !important; font-family: 'Assistant', sans-serif !important; }\n\n  /* Bank embed */\n  .bank-embed {\n    background: var(--accent-soft) !important;\n    border: 1px solid #F5E4D8 !important;\n    border-radius: 12px !important;\n  }\n  .bank-title { color: var(--accent) !important; }\n  .bank-value { color: var(--ink) !important; font-family: 'Assistant', sans-serif !important; }\n  .copy-btn {\n    background: var(--white) !important;\n    color: var(--accent) !important;\n    border: 1px solid #F5E4D8 !important;\n    border-radius: 6px !important;\n  }\n  .copy-btn:hover {\n    background: var(--accent) !important;\n    color: var(--white) !important;\n    border-color: var(--accent) !important;\n  }\n\n  /* Signature blocks */\n  .sig-grid { gap: 16px !important; border: 0 !important; background: transparent !important; }\n  .sig-block {\n    border: 1px solid var(--line) !important;\n    border-radius: 14px !important;\n    background: var(--white) !important;\n    padding: 24px 28px !important;\n  }\n  .sig-block h4 { color: var(--accent) !important; border-bottom-color: var(--line) !important; }\n  .sig-field input {\n    background: transparent !important;\n    border: 0 !important;\n    border-bottom: 1px solid var(--line) !important;\n    border-radius: 0 !important;\n    color: var(--ink) !important;\n    padding: 8px 0 !important;\n    font-family: 'Assistant', sans-serif !important;\n  }\n  .sig-field input:focus {\n    border-bottom-color: var(--accent) !important;\n    border-bottom-width: 1.5px !important;\n    box-shadow: none !important;\n  }\n  .sig-canvas { border: 1px dashed var(--ink-muted) !important; border-radius: 10px !important; background: var(--white) !important; }\n  .sig-canvas.signed { border: 1px solid var(--accent) !important; box-shadow: none !important; }\n  .sig-static { border: 1px solid var(--line) !important; border-radius: 10px !important; }\n  .sig-clear {\n    background: var(--white) !important;\n    color: var(--ink-soft) !important;\n    border: 1px solid var(--line) !important;\n    border-radius: 6px !important;\n    font-family: 'Assistant', sans-serif !important;\n  }\n  .sig-    <ul>\n            <li>על הסכם זה יחולו אך ורק דיני <strong>מדינת ישראל</strong>.</li>\n            <li>סמכות השיפוט הייחודית והבלעדית בכל עניין הנובע מהסכם זה מוקנית לבתי המשפט המוסמכים <strong>במחוז תל אביב-יפו</strong>.</li>\n            <li>הסכם זה ממצה את ההבנות בין הצדדים בנושאו, וכל שינוי בו ייעשה בכתב ובחתימת שני הצדדים.</li>\n            <li>אי-מימוש זכות על ידי צד כלשהו לא ייחשב כוויתור עליה.</li>\n          </ul>\n        </div>\n\n      </div>\n    </div>\n\n    <!-- SIGNATURE -->\n    <div class=\"signature-section\">\n      <div class=\"section-label\">05 · Signature</div>\n      <h2>אישור וחתימה דיגיטלית</h2>\n      <p class=\"sig-intro\">\n        // בחתימתכם מטה אתם מאשרים את תנאי ההצעה, לרבות החבילה שנבחרה והתנאים המצוינים בה.\n      </p>\n\n      <div class=\"sig-grid\">\n        <div class=\"sig-block\">\n          <h4>נציג FinBot</h4>\n          <div class=\"sig-field\">\n            <label>Name · שם מלא</label>\n            <input type=\"text\" id=\"finbotName\" placeholder=\"שם החותם\">\n          </div>\n          <div class=\"sig-field\">\n            <label>Role · תפקיד</label>\n            <input type=\"text\" id=\"finbotRole\" placeholder=\"למשל: מנכ״ל\">\n          </div>\n          <div class=\"sig-field\">\n            <label>Email · אימייל</label>\n            <input type=\"email\" id=\"finbotEmail\" placeholder=\"you@finbot.co.il\" dir=\"ltr\" style=\"text-align:right\">\n          </div>\n          <div class=\"sig-field\">\n            <label>Date · תאריך</label>\n            <input type=\"date\" id=\"finbotDate\" dir=\"ltr\" style=\"text-align:right; font-family:inherit;\">\n          </div>\n          <div class=\"sig-field\">\n            <label>Signature · חתימה</label>\n            <div class=\"sig-canvas-wrap\">\n              <canvas class=\"sig-canvas\" id=\"finbotSig\"></canvas>\n              <button class=\"sig-clear\" onclick=\"clearSig()\">Clear</button>\n            </div>\n            <div class=\"sig-hint\">Sign with mouse or touch</div>\n          </div>\n        </div>\n\n        <div class=\"sig-block locked\">\n          <h4>נותן השירות</h4>\n          <div class=\"sig-field\">\n            <label>Name · שם מלא</label>\n            <input type=\"text\" id=\"tiranName\" value=\"טיראן יסינוב\" readonly=\"\">\n          </div>\n          <div class=\"sig-field\">\n            <label>Role · תפקיד</label>\n            <input type=\"text\" id=\"tiranRole\" value=\"יועץ AI ותפעול\" readonly=\"\">\n          </div>\n          <div class=\"sig-field\">\n            <label>Date · תאריך</label>\n            <input type=\"text\" id=\"tiranDate\" value=\"17.04.2026\" readonly=\"\">\n          </div>\n          <div class=\"sig-field\">\n            <label>Signature · חתימה</label>\n            <div class=\"sig-static\">\n              <img id=\"tiranSigImg\" src=\"27d656d4-cd87-4bdf-8a6c-c1e082796e9d\" alt=\"חתימת טיראן יסינוב\">\n            </div>\n            <div class=\"sig-hint\">Permanent digital signature</div>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"action-row\">\n        <button class=\"action-btn\" id=\"btnSend\" onclick=\"sendEmail()\" disabled=\"\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 2L11 13\"></path><path d=\"M22 2l-7 20-4-9-9-4 20-7z\"></path></svg>\n          Sign &amp; Send · חתימה ושליחה\n        </button>\n      </div>\n      <div class=\"action-status\" id=\"sendStatus\"></div>\n    </div>\n  </div>\n\n  <div class=\"footer-note\">\n    TIRAN YASINOV<span class=\"sep\">/</span>tiranyas@gmail.com<span class=\"sep\">/</span>DIGITAL PROPOSAL<span class=\"sep\">/</span>2026.04.17\n  </div>\n</div>\n\n<div class=\"toast\" id=\"toast\"></div>\n\n<iframe name=\"fs_target\" id=\"fsTarget\" style=\"display:none;width:0;height:0;border:0\" tabindex=\"-1\" aria-hidden=\"true\"></iframe>\n<form id=\"emailForm\" action=\"https://formsubmit.co/tiranyas@gmail.com\" method=\"POST\" enctype=\"multipart/form-data\" style=\"display:none\" target=\"fs_target\">\n  <input type=\"hidden\" name=\"_subject\" value=\"הצעת מחיר חתומה - FinBot\">\n  <input type=\"hidden\" name=\"_captcha\" value=\"false\">\n  <input type=\"hidden\" name=\"_template\" value=\"table\">\n  <input type=\"hidden\" name=\"_cc\" id=\"formCC\">\n  <input type=\"hidden\" name=\"חבילה נבחרת\" id=\"formPackage\">\n  <input type=\"hidden\" name=\"שעות\" id=\"formHours\">\n  <input type=\"hidden\" name=\"סכום לפני מעמ\" id=\"formNet\">\n  <input type=\"hidden\" name=\"סכום כולל מעמ\" id=\"formGross\">\n  <input type=\"hidden\" name=\"שם החותם\" id=\"formSignerName\">\n  <input type=\"hidden\" name=\"תפקיד החותם\" id=\"formSignerRole\">\n  <input type=\"hidden\" name=\"אימייל החותם\" id=\"formSignerEmail\">\n  <input type=\"hidden\" name=\"תאריך חתימה\" id=\"formSignerDate\">\n  <input type=\"file\" name=\"attachment\" id=\"formAttachment\">\n</form>\n\n<script>\n  const RATE = 350;\n  const VAT = 0.18;\n  const fmt = (n) => n.toLocaleString('he-IL') + ' ש\"ח';\n  const fmtNum = (n) => n.toLocaleString('he-IL');\n\n  let selected = null;\n\n  // Animated counter\n  function animateCount(el, from, to, duration = 500) {\n    if (from === to) { el.textContent = fmtNum(to); return; }\n    const start = performance.now();\n    const step = (now) => {\n      const t = Math.min((now - start) / duration, 1);\n      const eased = 1 - Math.pow(1 - t, 3);\n      const v = Math.round(from + (to - from) * eased);\n      el.textContent = fmtNum(v);\n      if (t < 1) requestAnimationFrame(step);\n      else {\n        el.textContent = fmtNum(to);\n        el.classList.add('flash');\n        setTimeout(() => el.classList.remove('flash'), 400);\n      }\n    };\n    requestAnimationFrame(step);\n  }\n\n  function selectPackage(pkg) {\n    selected = pkg;\n    document.querySelectorAll('.pkg-row:not(.header)').forEach(r => r.classList.remove('selected'));\n    const row = document.querySelector(`.pkg-row[data-pkg=\"${pkg}\"]`);\n    if (row) row.classList.add('selected');\n    updateTotal();\n  }\n\n  function getCustomHoursRaw() {\n    const val = parseInt(document.getElementById('customHours').value, 10);\n    return isNaN(val) ? 0 : val;\n  }\n\n  function getHours() {\n    if (selected === 'basic') return 10;\n    if (selected === 'extended') return 20;\n    if (selected === 'custom') {\n      const val = getCustomHoursRaw();\n      return val >= 10 ? val : 0;\n    }\n    return 0;\n  }\n\n  function isCustomInvalid() {\n    return selected === 'custom' && getCustomHoursRaw() < 10;\n  }\n\n  let prevGross = 0;\n  function updateTotal() {\n    const hours = getHours();\n    const net = hours * RATE;\n    const gross = Math.round(net * (1 + VAT));\n    const labels = {\n      basic: 'Basic - 10 שעות',\n      extended: 'Extended - 20 שעות',\n      custom: `Custom - ${hours} שעות`,\n    };\n\n    if (!selected || hours === 0) {\n      document.getElementById('selectedLabel').textContent = 'לא נבחרה חבילה';\n      document.getElementById('selectedHours').textContent = '-';\n      document.getElementById('selectedNet').textContent = '-';\n      document.getElementById('selectedGross').textContent = '-';\n      prevGross = 0;\n    } else {\n      document.getElementById('selectedLabel').textContent = labels[selected];\n      document.getElementById('selectedHours').textContent = hours;\n      document.getElementById('selectedNet').textContent = fmt(net);\n      animateCount(document.getElementById('selectedGross'), prevGross, gross, 450);\n      prevGross = gross;\n    }\n\n    const warning = document.getElementById('customWarning');\n    const customInput = document.getElementById('customHours');\n    if (isCustomInvalid()) {\n      warning.classList.add('show');\n      customInput.classList.add('invalid');\n    } else {\n      warning.classList.remove('show');\n      customInput.classList.remove('invalid');\n    }\n\n    updateActionButtons();\n  }\n\n  function onCustomInput() {\n    const hours = Math.max(getCustomHoursRaw(), 0);\n    const net = hours * RATE;\n    const gross = Math.round(net * (1 + VAT));\n    document.getElementById('customPrice').textContent = hours >= 10 ? fmt(net) : '-';\n    document.getElementById('customTotal').textContent = hours >= 10 ? fmt(gross) : '-';\n    if (selected === 'custom') updateTotal();\n  }\n\n  let finbotPad = null, finbotCanvas = null;\n\n  function initFinbotPad() {\n    finbotCanvas = document.getElementById('finbotSig');\n    const ratio = Math.max(window.devicePixelRatio || 1, 1);\n    finbotCanvas.width = finbotCanvas.offsetWidth * ratio;\n    finbotCanvas.height = finbotCanvas.offsetHeight * ratio;\n    finbotCanvas.getContext('2d').scale(ratio, ratio);\n    finbotPad = new SignaturePad(finbotCanvas, {\n      backgroundColor: 'rgba(255,255,255,0)',\n      penColor: '#0B0A08',\n    });\n    finbotPad.addEventListener('endStroke', () => {\n      if (!finbotPad.isEmpty()) finbotCanvas.classList.add('signed');\n      updateActionButtons();\n    });\n  }\n\n  function clearSig() {\n    if (finbotPad) {\n      finbotPad.clear();\n      finbotCanvas.classList.remove('signed');\n      updateActionButtons();\n    }\n  }\n\n  function isValidEmail(e) { return /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(e.trim()); }\n\n  function isReadyForAction() {\n    const finbotSigned = finbotPad && !finbotPad.isEmpty();\n    const nameFilled = document.getElementById('finbotName').value.trim().length > 0;\n    const emailFilled = isValidEmail(document.getElementById('finbotEmail').value);\n    const packageValid = selected && getHours() > 0;\n    return finbotSigned && nameFilled && emailFilled && packageValid;\n  }\n\n  function updateActionButtons() {\n    const ready = isReadyForAction();\n    const btnSend = document.getElementById('btnSend');\n    btnSend.disabled = !ready;\n    if (!ready) {\n      const reasons = [];\n      if (!selected || getHours() === 0) reasons.push('בחרו חבילה');\n      if (!document.getElementById('finbotName').value.trim()) reasons.push('שם');\n      if (!isValidEmail(document.getElementById('finbotEmail').value)) reasons.push('אימייל');\n      if (!finbotPad || finbotPad.isEmpty()) reasons.push('חתימה');\n      document.getElementById('sendStatus').textContent = reasons.length ? 'MISSING: ' + reasons.join(' · ') : '';\n      document.getElementById('sendStatus').className = 'action-status';\n    } else {\n      document.getElementById('sendStatus').textContent = '✓ READY TO SEND';\n      document.getElementById('sendStatus').className = 'action-status success';\n    }\n  }\n\n  function showToast(msg, type = '') {\n    const t = document.getElementById('toast');\n    t.textContent = msg;\n    t.className = 'toast show ' + type;\n    setTimeout(() => t.classList.remove('show'), 3000);\n  }\n\n  function copyBank() {\n    const text = [\n      'פרטי העברה בנקאית - טיראן יסינוב',\n      'בנק: הבינלאומי הראשון (31)',\n      'סניף: 027 - חדרה',\n      \"מס' חשבון: 619612\",\n      'שם בעל החשבון: טיראן יסינוב',\n      'עוסק מורשה: 200946937',\n    ].join('\\n');\n\n    const btn = document.getElementById('copyBankBtn');\n    const origHTML = btn.innerHTML;\n    const onSuccess = () => {\n      btn.classList.add('copied');\n      btn.innerHTML = '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"/></svg><span>Copied</span>';\n      showToast('Bank details copied', 'success');\n      setTimeout(() => {\n        btn.classList.remove('copied');\n        btn.innerHTML = origHTML;\n      }, 2000);\n    };\n    if (navigator.clipboard && navigator.clipboard.writeText) {\n      navigator.clipboard.writeText(text).then(onSuccess).catch(() => fallbackCopy(text, onSuccess));\n    } else {\n      fallbackCopy(text, onSuccess);\n    }\n  }\n\n  function fallbackCopy(text, cb) {\n    const ta = document.createElement('textarea');\n    ta.value = text;\n    ta.style.position = 'fixed'; ta.style.opacity = '0';\n    document.body.appendChild(ta);\n    ta.select();\n    try { document.execCommand('copy'); cb(); }\n    catch (e) { showToast('Copy failed', 'error'); }\n    document.body.removeChild(ta);\n  }\n\n  async function generatePDFBlob() {\n    const el = document.getElementById('document');\n    el.classList.add('pdf-mode');\n    document.body.classList.add('pdf-capture');\n    // Force layout reflow so the renderer picks up the new styles.\n    // eslint-disable-next-line no-unused-expressions\n    el.offsetHeight;\n\n    const opts = {\n      margin: [8, 8, 8, 8],\n      filename: 'FinBot-Proposal.pdf',\n      image: { type: 'jpeg', quality: 0.98 },\n      html2canvas: {\n        scale: 2,\n        useCORS: true,\n        backgroundColor: '#FFFFFF',\n        logging: false\n      },\n      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait', compress: true },\n      pagebreak: { mode: ['css', 'legacy'], avoid: ['.signature-section', '.sig-block', '.pkg-row', '.total-box'] }\n    };\n    try {\n      const blob = await html2pdf().set(opts).from(el).output('blob');\n      return blob;\n    } finally {\n      el.classList.remove('pdf-mode');\n      document.body.classList.remove('pdf-capture');\n    }\n  }\n\n  async function downloadPDF() {\n    if (isCustomInvalid()) { showToast('Enter ≥10 hours', 'error'); return; }\n    const btn = document.getElementById('btnPDF');\n    const orig = btn.innerHTML;\n    btn.innerHTML = '...';\n    btn.disabled = true;\n    try {\n      const blob = await generatePDFBlob();\n      const filename = `FinBot-Proposal-${new Date().toISOString().slice(0,10)}.pdf`;\n      const url = URL.createObjectURL(blob);\n      const a = document.createElement('a');\n      a.href = url; a.download = filename; a.click();\n      URL.revokeObjectURL(url);\n      showToast('PDF downloaded', 'success');\n    } catch (e) {\n      showToast('PDF error', 'error'); console.error(e);\n    } finally {\n      btn.innerHTML = orig;\n      btn.disabled = false;\n    }\n  }\n\n  async function sendEmail() {\n    if (!isReadyForAction()) { showToast('Incomplete form', 'error'); return; }\n    const btn = document.getElementById('btnSend');\n    const status = document.getElementById('sendStatus');\n    const orig = btn.innerHTML;\n    btn.innerHTML = 'SENDING...';\n    btn.disabled = true;\n    status.textContent = 'Generating PDF...';\n    status.className = 'action-status';\n\n    try {\n      const blob = await generatePDFBlob();\n      const hours = getHours();\n      const net = hours * RATE;\n      const gross = Math.round(net * (1 + VAT));\n      const labels = { basic: 'Basic', extended: 'Extended', custom: `Custom (${hours} שעות)` };\n      const signerEmail = document.getElementById('finbotEmail').value.trim();\n      document.getElementById('formPackage').value = labels[selected] || '';\n      document.getElementById('formHours').value = hours;\n      document.getElementById('formNet').value = fmt(net);\n      document.getElementById('formGross').value = fmt(gross);\n      document.getElementById('formSignerName').value = document.getElementById('finbotName').value;\n      document.getElementById('formSignerRole').value = document.getElementById('finbotRole').value;\n      document.getElementById('formSignerDate').value = formatDateHeb(document.getElementById('finbotDate').value);\n      document.getElementById('formSignerEmail').value = signerEmail;\n      document.getElementById('formCC').value = signerEmail;\n\n      const filename = `FinBot-Proposal-Signed-${Date.now()}.pdf`;\n      const pdfFile = new File([blob], filename, { type: 'application/pdf' });\n      const dataTransfer = new DataTransfer();\n      dataTransfer.items.add(pdfFile);\n      document.getElementById('formAttachment').files = dataTransfer.files;\n\n      status.textContent = 'Sending...';\n      const form = document.getElementById('emailForm');\n      const iframe = document.getElementById('fsTarget');\n\n      await new Promise((resolve, reject) => {\n        let done = false;\n        const onLoad = () => {\n          if (done) return;\n          done = true;\n          iframe.removeEventListener('load', onLoad);\n          resolve();\n        };\n        iframe.addEventListener('load', onLoad);\n        // Safety timeout: FormSubmit usually redirects to a thank-you page\n        // within a few seconds; if the iframe never fires load we still\n        // treat as success after 15s (email is likely through).\n        setTimeout(() => {\n          if (done) return;\n          done = true;\n          iframe.removeEventListener('load', onLoad);\n          resolve();\n        }, 15000);\n        try {\n          form.submit();\n        } catch (err) {\n          done = true;\n          iframe.removeEventListener('load', onLoad);\n          reject(err);\n        }\n      });\n\n      btn.innerHTML = '✓ SENT';\n      status.textContent = '✓ SIGNED PROPOSAL SENT SUCCESSFULLY';\n      status.className = 'action-status success';\n      showToast('Proposal sent', 'success');\n      const url = URL.createObjectURL(blob);\n      const a = document.createElement('a');\n      a.href = url; a.download = filename; a.click();\n      URL.revokeObjectURL(url);\n    } catch (e) {\n      console.error('Send failed:', e);\n      status.textContent = '✗ SEND FAILED — ' + (e.message || 'unknown');\n      status.className = 'action-status error';\n      btn.innerHTML = orig;\n      btn.disabled = false;\n    }\n  }\n\n  function formatDateHeb(iso) {\n    if (!iso) return '';\n    const [y, m, d] = iso.split('-');\n    return `${d}.${m}.${y}`;\n  }\n\n  function todayIso() {\n    const now = new Date();\n    return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;\n  }\n\n  window.addEventListener('load', () => {\n    initFinbotPad();\n    selectPackage('basic');\n\n    const dateInput = document.getElementById('finbotDate');\n    const today = todayIso();\n    dateInput.value = today;\n    dateInput.min = today;\n\n    document.getElementById('finbotName').addEventListener('input', updateActionButtons);\n    document.getElementById('finbotEmail').addEventListener('input', updateActionButtons);\n    document.getElementById('customHours').addEventListener('input', updateActionButtons);\n\n    window.addEventListener('resize', () => {\n      if (!finbotPad) return;\n      const data = finbotPad.toData();\n      const ratio = Math.max(window.devicePixelRatio || 1, 1);\n      finbotCanvas.width = finbotCanvas.offsetWidth * ratio;\n      finbotCanvas.height = finbotCanvas.offsetHeight * ratio;\n      finbotCanvas.getContext('2d').scale(ratio, ratio);\n      finbotPad.fromData(data);\n    });\n  });\n<\/script>\n\n<script>\n(function() {\n  // Per-card tracking for hover glow\n  function track(el) {\n    el.addEventListener('mousemove', (e) => {\n      const rect = el.getBoundingClientRect();\n      el.style.setProperty('--mx', (e.clientX - rect.left) + 'px');\n      el.style.setProperty('--my', (e.clientY - rect.top) + 'px');\n    });\n  }\n  // Page-wide spotlight tracking\n  document.addEventListener('mousemove', (e) => {\n    document.body.style.setProperty('--page-mx', e.clientX + 'px');\n    document.body.style.setProperty('--page-my', e.clientY + 'px');\n  });\n  window.addEventListener('load', () => {\n    document.querySelectorAll('.party, .service, .info-card, .sig-block, .bank-embed, .pkg-row:not(.header)').forEach(track);\n  });\n})();\n<\/script>\n\n<!-- TWEAKS PANEL -->\n<div class=\"tweaks-panel\" id=\"tweaksPanel\">\n  <h4>Tweaks</h4>\n  <div class=\"tweaks-row\">\n    <span class=\"tweaks-label\">Hero theme</span>\n    <div class=\"tweaks-seg\" id=\"heroThemeSeg\">\n      <button data-val=\"light\">Light</button>\n      <button data-val=\"dark\">Dark</button>\n    </div>\n  </div>\n</div>\n<script>\n(function(){\n  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n    \"heroTheme\": \"dark\"\n  }/*EDITMODE-END*/;\n  const state = Object.assign({}, TWEAK_DEFAULTS);\n\n  function applyHeroTheme(v) {\n    document.body.classList.toggle('hero-dark', v === 'dark');\n    document.querySelectorAll('#heroThemeSeg button').forEach(b => {\n      b.classList.toggle('on', b.dataset.val === v);\n    });\n  }\n  function apply() {\n    applyHeroTheme(state.heroTheme);\n  }\n\n  document.addEventListener('click', (e) => {\n    const btn = e.target.closest('#heroThemeSeg button');\n    if (!btn) return;\n    state.heroTheme = btn.dataset.val;\n    apply();\n    try {\n      window.parent.postMessage({type: '__edit_mode_set_keys', edits: {heroTheme: state.heroTheme}}, '*');\n    } catch(_) {}\n  });\n\n  // apply defaults on load\n  apply();\n\n  // Edit-mode protocol\n  window.addEventListener('message', (ev) => {\n    const d = ev.data || {};\n    if (d.type === '__activate_edit_mode') {\n      document.getElementById('tweaksPanel').classList.add('active');\n    } else if (d.type === '__deactivate_edit_mode') {\n      document.getElementById('tweaksPanel').classList.remove('active');\n    }\n  });\n  try { window.parent.postMessage({type: '__edit_mode_available'}, '*'); } catch(_) {}\n})();\n<\/script>\n\n\n</body></html>"
  </script>
